<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptime Lens | Service Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <meta name="description" content="Real-time uptime and status monitoring for core cloud and developer services.">
</head>

<body>
    <div class="background-glow"></div>
    <div class="background-glow pos-2"></div>

    <main class="container">
        <header>
            <div class="logo-container">
                <div class="lens-icon"></div>
                <h1>Uptime Lens</h1>
            </div>
            <p class="subtitle">Cloud & Developer Service Status Monitor</p>
            <div id="global-status" class="global-status loading">
                <span class="status-indicator"></span>
                <span class="status-text">Checking systems...</span>
            </div>
        </header>

        <section class="services-grid" id="services-grid">
            <!-- Services will be populated here via JS -->
            <div class="service-card skeleton">
                <div class="skeleton-header"></div>
                <div class="skeleton-body"></div>
            </div>
            <div class="service-card skeleton">
                <div class="skeleton-header"></div>
                <div class="skeleton-body"></div>
            </div>
            <div class="service-card skeleton">
                <div class="skeleton-header"></div>
                <div class="skeleton-body"></div>
            </div>
        </section>

        <footer>
            <p>Monitored via GitHub Actions. Data updates every 10 minutes.</p>
        </footer>
    </main>

    <!-- Template for a service card -->
    <template id="service-card-template">
        <a class="service-card-link" href="#" target="_blank" rel="noopener noreferrer">
            <div class="service-card">
                <div class="card-header">
                    <div class="provider-info">
                        <span class="provider-icon"></span>
                        <h2 class="provider-name"></h2>
                    </div>
                    <div class="status-badge">
                        <span class="badge-dot"></span>
                        <span class="badge-text"></span>
                    </div>
                </div>
                <p class="status-description"></p>
                <div class="last-checked">
                    Last checked: <span class="time-ago"></span>
                </div>
            </div>
        </a>
    </template>

    <script src="js/app.js"></script>
</body>

</html>
