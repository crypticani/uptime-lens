<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptime Lens | Service Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <meta name="description" content="Real-time uptime and status monitoring for core cloud and developer services.">
</head>

<body>
    <a href="https://t.me/uptime_lens" target="_blank" rel="noopener noreferrer" class="telegram-subscribe"
        title="Subscribe for alerts on Telegram">
        <svg class="telegram-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" />
        </svg>
        <span>Subscribe</span>
    </a>
    <div class="background-glow"></div>
    <div class="background-glow pos-2"></div>

    <main class="container">
        <header>
            <div class="logo-container">
                <div class="lens-icon"></div>
                <h1>Uptime Lens</h1>
            </div>
            <p class="subtitle">Cloud & Developer Service Status Monitor</p>
            <div id="global-status" class="global-status loading">
                <span class="status-indicator"></span>
                <span class="status-text">Checking systems...</span>
            </div>
        </header>

        <section class="services-grid" id="services-grid">
            <!-- Services will be populated here via JS -->
            <div class="service-card skeleton">
                <div class="skeleton-header"></div>
                <div class="skeleton-body"></div>
            </div>
            <div class="service-card skeleton">
                <div class="skeleton-header"></div>
                <div class="skeleton-body"></div>
            </div>
            <div class="service-card skeleton">
                <div class="skeleton-header"></div>
                <div class="skeleton-body"></div>
            </div>
        </section>

        <footer>
            <p>Monitored via GitHub Actions. Data updates every 10 minutes.</p>
        </footer>
    </main>

    <!-- Template for a service card -->
    <template id="service-card-template">
        <a class="service-card-link" href="#" target="_blank" rel="noopener noreferrer">
            <div class="service-card">
                <div class="card-header">
                    <div class="provider-info">
                        <span class="provider-icon"></span>
                        <h2 class="provider-name"></h2>
                    </div>
                    <div class="status-badge">
                        <span class="badge-dot"></span>
                        <span class="badge-text"></span>
                    </div>
                </div>
                <p class="status-description"></p>
                <div class="last-checked">
                    Last checked: <span class="time-ago"></span>
                </div>
            </div>
        </a>
    </template>

    <script src="js/app.js"></script>
</body>

</html>
